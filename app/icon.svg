<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="12" fill="#EFE8DA"/>
  <g>
    <!-- outer ring -->
    <circle cx="32" cy="32" r="23" fill="none" stroke="#2B3542" stroke-width="4"/>
    <!-- left / right panels split by a central seam -->
    <rect x="16" y="15" width="14" height="34" rx="2" fill="#2B3542"/>
    <rect x="34" y="15" width="14" height="34" rx="2" fill="#2B3542"/>
    <!-- central vertical stem -->
    <rect x="30.5" y="7" width="3" height="50" fill="#2B3542"/>
    <!-- central node -->
    <circle cx="32" cy="32" r="6" fill="#EFE8DA" stroke="#2B3542" stroke-width="3"/>
  </g>
</svg>
